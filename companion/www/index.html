<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>OneWheel Companion</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <main>
      <h1>OneWheel Companion</h1>

      <section class="card">
        <div class="card-head">
          <h2>Board</h2>
          <span id="dot" class="dot"></span>
        </div>
        <p class="hint">
          Connect to your Onewheel+ XR and relay live data to the watch.
        </p>

        <div class="readout">
          <div class="stat">
            <span class="label">Battery</span>
            <span id="battery" class="value">--%</span>
          </div>
          <div class="stat">
            <span class="label">Speed</span>
            <span id="speed" class="value">-- mph</span>
          </div>
        </div>

        <div class="buttons">
          <button id="connectBtn">Connect</button>
          <button id="disconnectBtn" disabled>Disconnect</button>
        </div>

        <p id="status" class="status">Idle</p>
      </section>

      <details class="card devpanel">
        <summary>Developer test (no board)</summary>
        <p class="hint">
          Push manual values straight to the watch over PebbleKit.
        </p>

        <label class="row">
          <span>Battery %</span>
          <input id="batterySlider" type="range" min="0" max="100" value="80" />
        </label>
        <label class="row">
          <span>Speed (mph)</span>
          <input id="speedSlider" type="range" min="0" max="250" value="124" />
        </label>

        <div class="buttons">
          <button id="sendBtn">Send once</button>
          <button id="streamBtn">Start stream</button>
        </div>

        <p id="devStatus" class="status">Idle</p>
      </details>
    </main>

    <script src="app.js"></script>
  </body>
</html>
